[build-system]
requires = ["uv_build>=0.8.13,<0.9.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
minversion = "6.0"
pythonpath = [
  "src"
]

[project]
name = "umi"
version = "0.1.0" 
description = "Dependencies for the Universal Manipulation Interface project."
readme = "README.md"
requires-python = ">=3.10" 

dependencies = [
    # Core dependencies
    "click>=8.2.1",
    "matplotlib>=3.7",
    "numpy>=2.0,<3",
    "opencv-contrib-python",
    "pyyaml==6.0",
    "tqdm",
    "zarr>=2.16",
    "numcodecs==0.11",
    "scikit-video",

    # Media processing
    "av>=15.0.0",
    "imagecodecs>=2023.9.18",

    # Database
    "lmdb==1.4",

    # Performance
    "threadpoolctl==3.2",

    # Utilities
    "atomics==1.0.2",
    "fastcrc==0.2",
    "PyExifTool==0.5",

    "spnav @ https://github.com/cheng-chi/spnav/archive/c1c938ebe3cc542db4685e0d13850ff1abfdb943.tar.gz",
    "py-gpmf-parser @ git+https://github.com/urbste/py-gpmf-parser.git",
    "imagecodecs>=2023.9.18",
    "loguru",
    "pandas>=2.2.2",
    "scikit-fda",

    "lerobot==0.4.4"
]

[project.urls]
"Homepage" = "https://github.com/real-stanford/universal_manipulation_interface"

[project.scripts]
umi = "umi.cli:cli"
